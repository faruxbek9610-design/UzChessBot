<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="UzChess Elite - O'ynaymizmi?">
    <meta property="og:description" content="Do'stingiz sizni shaxmat jangiga chorlamoqda! Kiring va g'olib bo'ling.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1529699211952-734e80c4d42b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1200&q=80">
    <meta property="og:type" content="website">
    
    <title>UzChess Elite - RETURN GAME</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { 
            --gold: #ebd097; 
            --bg: #121212; 
            --dark-card: #1e1e1e; 
            --green: #00d64f;
            --red: #ff4d4d;
            --blue-highlight: rgba(0, 195, 255, 0.6);
            --blue-last: rgba(0, 195, 255, 0.5); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; position: relative; }
        .hidden { display: none !important; }

        /* MENU */
        #screen-menu { justify-content: center; padding: 20px; text-align: center; }
        h1 { color: var(--gold); font-size: 2.5rem; margin-bottom: 20px; text-shadow: 0 0 10px rgba(235, 208, 151, 0.3); }
        .btn-gold { background: linear-gradient(45deg, #b88a44, #ebd097); color: black; padding: 18px; width: 100%; max-width: 320px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(235, 208, 151, 0.2); transition: 0.2s; }
        .btn-gold:active { transform: scale(0.98); }

        /* GAME UI */
        .player-info { width: 95%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--dark-card); border-radius: 8px; margin: 5px 0; border: 1px solid #333; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #555; display: inline-block; margin-right: 6px; }
        .status-dot.online { background: var(--green); box-shadow: 0 0 5px var(--green); }
        
        .clock { font-family: monospace; font-size: 1.5rem; padding: 5px 12px; background: #000; border: 1px solid #444; border-radius: 6px; color: #888; }
        .clock.active { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(235, 208, 151, 0.2); }
        
        .board-wrapper { width: 98vw; max-width: 450px; aspect-ratio: 1/1; position: relative; margin: 5px 0; }
        #myBoard { width: 100%; height: 100%; touch-action: none; }

        /* YURISH BELGILARI */
        .highlight-move { box-shadow: inset 0 0 3px 3px var(--blue-highlight); background: rgba(0, 195, 255, 0.2); }
        .highlight-active { background: rgba(235, 208, 151, 0.4); }
        .highlight-last { background-color: var(--blue-last) !important; box-shadow: inset 0 0 5px rgba(255,255,255,0.5); }

        /* MODALS */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .modal-box { width: 85%; max-width: 320px; background: #1a1a1a; border: 1px solid var(--gold); border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .modal-box h3, .modal-box h2 { color: var(--gold); margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; margin: 10px 0; color: #ccc; font-size: 1.1rem; }
        .info-row b { color: white; }
        .anim-text { margin-top: 20px; color: #888; font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* ICONS */
        .go-icon { font-size: 4rem; margin: 20px 0; display: block; }
        .win { color: var(--gold); text-shadow: 0 0 20px var(--gold); }
        .lose { color: var(--red); text-shadow: 0 0 20px var(--red); }
        .draw { color: #ccc; }

        /* BOTTOM NAV */
        .bottom-nav { width: 100%; padding: 10px; background: var(--dark-card); border-top: 1px solid #333; display: flex; gap: 8px; position: fixed; bottom: 0; left: 0; z-index: 500; }
        .ctrl-btn { background: var(--dark-card); border: 1px solid var(--gold); color: var(--gold); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; }
        .ctrl-btn:active { background: var(--gold); color: black; }
        .ctrl-btn i { font-size: 1.2rem; }

        /* CHAT NOTIFY */
        .ctrl-btn.has-msg { border-color: var(--red); box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); animation: flash 1s infinite; }
        .ctrl-btn.has-msg::after {
            content: '!'; position: absolute; top: -5px; right: 5px; background: var(--red); color: white;
            width: 20px; height: 20px; border-radius: 50%; font-size: 0.9rem; line-height: 20px; text-align: center;
            border: 2px solid var(--dark-card);
        }
        @keyframes flash { 0% { border-color: var(--gold); } 50% { border-color: var(--red); } 100% { border-color: var(--gold); } }

        /* CHAT SIDEBAR */
        #chat-sidebar { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: #151515; z-index: 3000; transition: 0.3s; border-left: 2px solid var(--gold); display: flex; flex-direction: column; }
        #chat-sidebar.open { right: 0; }
        .chat-header { padding: 15px; background: #111; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #333; padding: 8px 12px; border-radius: 8px; max-width: 90%; word-wrap: break-word; font-size: 0.95rem; }
        .chat-footer { padding: 10px; background: #111; border-top: 1px solid #333; display: flex; gap: 10px; height: 70px; align-items: center; }
        .chat-footer input { flex: 1; height: 45px; background: #222; border: 1px solid #444; color: white; padding: 0 15px; border-radius: 25px; font-size: 1rem; }
        .chat-footer button { width: 45px; height: 45px; border-radius: 50%; background: var(--gold); border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; color: black; }

        /* SETUP */
        .setup-box { background: var(--dark-card); padding: 25px; border-radius: 15px; border: 1px solid #444; width: 90%; max-width: 350px; text-align: center; }
        .color-opt { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .c-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
        .c-circle.sel { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 15px var(--gold); }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 20px; background: #333; outline: none; border-radius: 10px; margin: 20px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 35px; height: 35px; border-radius: 50%; background: var(--gold); cursor: pointer; border: 2px solid white; }

        #toast { visibility: hidden; min-width: 250px; background-color: #222; color: var(--gold); text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 5000; left: 50%; transform: translateX(-50%); bottom: 100px; border: 1px solid var(--gold); font-size: 1rem; box-shadow: 0 0 15px black; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {opacity: 0;} to {opacity: 1;} } @keyframes fadeout { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">Xabar</div>
    <div class="modal-overlay" id="overlay" style="display:none;" onclick="toggleChat(false)"></div>

    <div id="screen-menu" class="screen">
        <h1>♕ UzChess Elite</h1>
        <button class="btn-gold" onclick="openSetup('friend')">👥 Do'st bilan o'ynash</button>
        <button class="btn-gold" onclick="startRandom()">🎲 Tasodifiy Raqib</button>
        <button class="btn-gold" style="background: linear-gradient(45deg, #1565C0, #00E5FF); color: white;" onclick="startBotGame()">🤖 Kompyuter (Bot) bilan</button>
        
        <button class="btn-gold" style="background: linear-gradient(45deg, #1e1e1e, #333); color: var(--gold); border: 1px solid var(--gold);" onclick="rejoinGame()">
            <i class="fas fa-play"></i> O'yinga Qaytish
        </button>
    </div>

    <div id="screen-setup" class="screen hidden" style="justify-content:center;">
        <div class="setup-box">
            <h2 id="setup-title" style="color:var(--gold); margin-bottom:15px;">Yangi O'yin</h2>
            <div class="color-opt">
                <div class="c-circle sel" style="background:#eee;" id="c-w" onclick="setPref('color', 'w')"></div>
                <div class="c-circle" style="background:#222;" id="c-b" onclick="setPref('color', 'b')"></div>
            </div>
            <p style="color:#aaa;">Vaqt: <b id="time-val" style="color:white; font-size:1.2rem;">10</b> daqiqa</p>
            <input type="range" min="1" max="60" value="10" oninput="updateTime(this.value)">
            <button class="btn-gold" id="setup-main-btn" onclick="createGame()">🚀 Do`stni taklif qilish</button>
            <button class="ctrl-btn" style="width:100%; border:none; background:transparent;" onclick="goHome()">Bekor qilish</button>
        </div>
    </div>

    <div id="screen-game" class="screen hidden" style="justify-content:flex-start; padding-top:10px;">
        <div class="player-info">
            <div style="display:flex; align-items:center; gap:8px;">
                <span id="dot-top" class="status-dot"></span>
                <span id="name-top" style="color:#ccc; font-weight:bold;">Raqib</span>
            </div>
            <div id="clock-top" class="clock">00:00</div>
        </div>

        <div class="board-wrapper">
            <div id="myBoard"></div>

            <div id="modal-waiting" class="modal-overlay" style="display:none; position:absolute;">
                <div class="modal-box">
                    <h3>Raqib Kutilmoqda...</h3>
                    <div class="info-row"><span>Vaqt:</span> <b id="wait-time">10 min</b></div>
                    <div class="info-row"><span>Siz:</span> <b id="wait-color">Oq</b></div>
                    <div class="anim-text">Linkni do'stingizga yuboring</div>
                    <button class="btn-gold" style="margin-top:20px; font-size:1rem; padding:12px;" id="share-link-btn">🔗 Linkni Ulashish</button>
                </div>
            </div>

            <div id="modal-searching" class="modal-overlay" style="display:none; position:absolute;">
                <div class="modal-box">
                    <h3>Raqib qidirilmoqda...</h3>
                    <i class="fas fa-spinner fa-spin go-icon win"></i>
                    <p style="color:#aaa;">Bot a'zolari orasidan munosib raqib izlanyapti</p>
                    <button class="btn-gold" style="margin-top:20px; background:#ff4d4d; color:white;" onclick="cancelSearch()">Voz kechish</button>
                </div>
            </div>

            <div id="modal-join" class="modal-overlay" style="display:none; position:absolute;">
                <div class="modal-box">
                    <h3>O'yin Taklifi!</h3>
                    <div class="info-row"><span>Raqib:</span> <b id="join-opp">Ali</b></div>
                    <div class="info-row"><span>Vaqt:</span> <b id="join-time">10 min</b></div>
                    <div class="info-row"><span>Siz:</span> <b id="join-color">Qora</b></div>
                    <div style="margin-top:20px; display:flex; gap:10px;">
                        <button class="btn-gold" style="background:#00d64f; color:white;" onclick="acceptGame()">✅ O'ynash</button>
                        <button class="btn-gold" style="background:#ff4d4d; color:white;" onclick="goHome()">❌ Yo'q</button>
                    </div>
                </div>
            </div>

            <div id="modal-gameover" class="modal-overlay" style="display:none; position:absolute;">
                <div class="modal-box">
                    <h2 id="go-title" style="margin-bottom:10px;">O'yin tugadi</h2>
                    <i id="go-icon" class="fas fa-trophy go-icon win"></i>
                    <p id="go-msg" style="color:#ccc; margin-bottom:20px; font-size:1.1rem;"></p>
                    <button class="btn-gold" id="rematch-btn" onclick="goHome()">BOSH MENYU ↻</button>
                </div>
            </div>
        </div>

        <div class="player-info">
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="status-dot online"></span>
                <span id="name-bottom" style="font-weight:bold; color:white;">Siz</span>
            </div>
            <div id="clock-bottom" class="clock">00:00</div>
        </div>

        <div class="bottom-nav">
            <button id="chat-btn" class="ctrl-btn" onclick="toggleChat(true)"><i class="fas fa-comment-dots"></i> Chat</button>
            <button class="ctrl-btn" onclick="gameAction('resign')"><i class="fas fa-flag"></i> Taslim</button>
            <button class="ctrl-btn" onclick="gameAction('draw')"><i class="fas fa-handshake"></i> Durrang</button>
            <button class="ctrl-btn" style="border-color:#555; color:#aaa;" onclick="goHome()"><i class="fas fa-home"></i> Chiqish</button>
        </div>
    </div>

    <div id="chat-sidebar">
        <div class="chat-header">
            <b style="color:var(--gold); font-size:1.2rem;">Chat</b>
            <span onclick="toggleChat(false)" style="cursor:pointer; font-size:1.5rem;">✕</span>
        </div>
        <div id="chat-msgs" class="chat-msgs"></div>
        <div class="chat-footer">
            <input type="text" id="chat-in" placeholder="Xabar yozing...">
            <button onclick="sendChat()">➤</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let globalGameUrl = ""; 
        let user = tg.initDataUnsafe?.user || { id: null, first_name: 'Mehmon' };
        
        if(!user.id) {
            if(localStorage.getItem('uzchess_uid')) {
                user.id = parseInt(localStorage.getItem('uzchess_uid'));
                user.first_name = localStorage.getItem('uzchess_name') || "Mehmon";
            } else {
                user.id = Math.floor(100000 + Math.random() * 900000);
                user.first_name = prompt("Ismingiz?") || "Mehmon";
                localStorage.setItem('uzchess_uid', user.id);
                localStorage.setItem('uzchess_name', user.first_name);
            }
        }
        $('#name-bottom').text(user.first_name);

        // Firebase Realtime Database konfiguratsiyasi
        const firebaseConfig = {
            apiKey: "AIzaSyBZZSWMTNf0Jp80ndxrss-E2eASQCl6SWI",
            authDomain: "uzchess-579b9.firebaseapp.com",
            databaseURL: "https://uzchess-579b9-default-rtdb.firebaseio.com",
            projectId: "uzchess-579b9",
            storageBucket: "uzchess-579b9.firebasestorage.app",
            messagingSenderId: "317369640428",
            appId: "1:317369640428:web:dd5b9e62b35c7036770cc9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let game = new Chess();
        let board = null;
        let isBotMode = false;
        
        let gameId = tg.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('g');
        
        let myColor = 'w';
        let prefs = { color: 'w', time: 10 };
        let timerInt = null;
        let selectedSquare = null;
        let isChatOpen = false;

        let botWTime = 600, botBTime = 600;

        const sounds = {
            start: new Audio('https://raw.githubusercontent.com/lichess-org/lila/master/public/sound/standard/GenericNotify.mp3'),
            move: new Audio('https://raw.githubusercontent.com/lichess-org/lila/master/public/sound/standard/Move.mp3'),
            capture: new Audio('https://raw.githubusercontent.com/lichess-org/lila/master/public/sound/standard/Capture.mp3'),
            check: new Audio('https://raw.githubusercontent.com/lichess-org/lila/master/public/sound/standard/GenericNotify.mp3'),
            win: new Audio('https://raw.githubusercontent.com/lichess-org/lila/master/public/sound/standard/Victory.mp3'),
            lose: new Audio('https://raw.githubusercontent.com/lichess-org/lila/master/public/sound/standard/Defeat.mp3'),
            notify: new Audio('https://raw.githubusercontent.com/lichess-org/lila/master/public/sound/standard/GenericNotify.mp3')
        };

        function playSound(name) {
            try { if(sounds[name]) { sounds[name].currentTime=0; sounds[name].play().catch(()=>{}); } } catch(e){}
        }

        function rejoinGame() {
            let lastId = localStorage.getItem('uzchess_last_game_id');
            if(lastId) {
                gameId = lastId;
                isBotMode = false;
                loadGame(gameId);
            } else {
                showToast("Hali o'yin o'ynamagansiz!");
            }
        }

        function highlightLastMove(from, to) {
            $('.square-55d63').removeClass('highlight-last');
            if (from && to) {
                $('.square-' + from).addClass('highlight-last');
                $('.square-' + to).addClass('highlight-last');
            }
        }

        function goHome() {
            clearInterval(timerInt); timerInt = null;
            $('.screen').addClass('hidden'); $('#screen-menu').removeClass('hidden');
            if(gameId && myColor && !isBotMode) db.ref(`games/${gameId}/${myColor==='w'?'p1_online':'p2_online'}`).set(false);
            gameId = null; isBotMode = false;
        }

        function openSetup(mode) { 
            $('.screen').addClass('hidden'); 
            $('#screen-setup').removeClass('hidden'); 
        }

        function setPref(k,v) { prefs[k]=v; if(k==='color'){$('.c-circle').removeClass('sel');$('#c-'+v).addClass('sel');} }
        function updateTime(v) { prefs.time=parseInt(v); $('#time-val').text(v); }
        function showToast(t) { let e=document.getElementById('toast'); e.innerText=t; e.className="show"; setTimeout(()=>{e.className=""},3000); }
        
        function toggleChat(show) { 
            if(isBotMode) { showToast("Bot rejimida chat mavjud emas!"); return; }
            isChatOpen = show;
            if(show) {
                $('#chat-sidebar').addClass('open'); 
                $('#chat-btn').removeClass('has-msg'); 
            } else {
                $('#chat-sidebar').removeClass('open');
            }
        }

        // --- 🔥 DO'ST BILAN O'YIN YARATISH: APIdan foydalanamiz! ---
        function createGame() {
            isBotMode = false;
            showToast("O'yin xonasi yaratilmoqda...");

            // Biz yaratgan FastAPI POST so'rovini chaqiramiz
            $.ajax({
                url: `/api/game/create?creator_id=${user.id}&time_limit=${prefs.time}&chosen_color=${prefs.color}`,
                type: 'POST',
                success: function(response) {
                    if(response.status === 'success') {
                        gameId = response.game_id;
                        globalGameUrl = response.game_url; // Bot yuboradigan to'liq url
                        localStorage.setItem('uzchess_last_game_id', gameId);
                        
                        myColor = prefs.color;
                        
                        // Firebase Realtime DB da sinxronizatsiya strukturasini tayyorlaymiz
                        const d = {
                            fen: 'start', turn: 'w',
                            initialTime: prefs.time*60, wTime: prefs.time*60, bTime: prefs.time*60,
                            creatorColor: prefs.color, 
                            p1_name: user.first_name, p1_id: user.id, p1_online: true,
                            status: 'waiting'
                        };

                        db.ref('games/'+gameId).set(d).then(()=>{
                            initBoard(true); // O'yin maydonini ishga tushirish (Kutish modalini ochadi)
                            listenToGameUpdates(gameId);
                        });
                    }
                },
                error: function(error) {
                    showToast("API orqali o'yin yaratishda xato: " + error.responseText);
                }
            });
        }

        // --- TAKLIF LINKINI ULASHISH TUGMASI ---
        $(document).on('click', '#share-link-btn', function() {
            if (globalGameUrl) {
                const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(globalGameUrl)}&text=${encodeURIComponent("UzChess Elite'da men bilan shaxmat o'yna! 👑")}`;
                tg.openTelegramLink(shareUrl);
            } else {
                const fallbackLink = `https://t.me/UzCheess_bot/app?startapp=${gameId}`;
                const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(fallbackLink)}&text=${encodeURIComponent("UzChess Elite'da men bilan shaxmat o'yna! 👑")}`;
                tg.openTelegramLink(shareUrl);
            }
        });

        // --- MATCHMAKING POOL (TASODIFIY O'YIN) ---
        function startRandom() {
            $('.screen').addClass('hidden'); $('#screen-game').removeClass('hidden');
            $('#modal-searching').show();
            isBotMode = false;

            const poolRef = db.ref('matchmaking_pool');
            poolRef.once('value', snapshot => {
                let pool = snapshot.val() || {};
                let foundGameId = null;

                for (let key in pool) {
                    if (pool[key].p1_id !== user.id) {
                        foundGameId = key;
                        break;
                    }
                }

                if (foundGameId) {
                    gameId = foundGameId;
                    localStorage.setItem('uzchess_last_game_id', gameId);
                    poolRef.child(gameId).remove();

                    db.ref('games/'+gameId).update({
                        p2_name: user.first_name, p2_id: user.id, status: 'playing', p2_online: true
                    }).then(() => {
                        $('#modal-searching').hide();
                        db.ref('games/'+gameId).once('value', s => {
                            let gd = s.val();
                            myColor = gd.creatorColor === 'w' ? 'b' : 'w';
                            initBoard(false);
                            listenToGameUpdates(gameId);
                        });
                    });
                } else {
                    gameId = Math.random().toString(36).substring(2, 9);
                    localStorage.setItem('uzchess_last_game_id', gameId);
                    myColor = Math.random() > 0.5 ? 'w' : 'b';

                    const d = {
                        fen: 'start', turn: 'w',
                        initialTime: 600, wTime: 600, bTime: 600,
                        creatorColor: myColor, 
                        p1_name: user.first_name, p1_id: user.id, p1_online: true,
                        status: 'playing'
                    };

                    db.ref('games/'+gameId).set(d).then(() => {
                        poolRef.child(gameId).set({ p1_id: user.id, time: Date.now() });
                        listenToGameUpdates(gameId);
                    });
                }
            });
        }

        function cancelSearch() {
            if (gameId) {
                db.ref('matchmaking_pool/' + gameId).remove();
                db.ref('games/' + gameId).remove();
            }
            $('#modal-searching').hide();
            goHome();
        }

        // --- REALTIME GAME LISTENERS ---
        function listenToGameUpdates(gid) {
            db.ref('games/'+gid).on('value', snapshot => {
                const gd = snapshot.val();
                if(!gd) return;

                // Raqib ismini yangilash
                if(myColor === gd.creatorColor) {
                    if(gd.p2_name) {
                        $('#name-top').text(gd.p2_name);
                        $('#dot-top').attr('class', gd.p2_online ? 'status-dot online' : 'status-dot');
                        if(gd.status === 'playing') $('#modal-waiting').hide();
                    }
                } else {
                    $('#name-top').text(gd.p1_name);
                    $('#dot-top').attr('class', gd.p1_online ? 'status-dot online' : 'status-dot');
                }

                // Doska holati (FEN) sinxronizatsiyasi
                if(gd.fen && gd.fen !== 'start' && gd.fen !== game.fen()) {
                    game.load(gd.fen);
                    board.position(gd.fen);
                    playSound('move');
                }

                // Vaqtlarni ko'rsatish
                const fmt = s => {
                    let m=Math.floor(s/60), x=Math.floor(s%60);
                    return (m<10?'0':'')+m+':'+(x<10?'0':'')+x;
                };
                if(myColor === 'w') {
                    $('#clock-bottom').text(fmt(gd.wTime)).toggleClass('active', gd.turn === 'w');
                    $('#clock-top').text(fmt(gd.bTime)).toggleClass('active', gd.turn === 'b');
                } else {
                    $('#clock-bottom').text(fmt(gd.bTime)).toggleClass('active', gd.turn === 'b');
                    $('#clock-top').text(fmt(gd.wTime)).toggleClass('active', gd.turn === 'w');
                }

                // O'yin statusini tekshirish
                if(gd.status.startsWith('resign_')) {
                    let loserColor = gd.status.split('_')[1];
                    showGameOver(loserColor === myColor ? "Siz taslim bo'ldingiz!" : "Raqib taslim bo'ldi. G'alaba!");
                } else if(gd.status === 'timeout') {
                    showGameOver("Vaqt tugadi!");
                }
            });
        }

        function showGameOver(msg) {
            clearInterval(timerInt);
            $('#go-msg').text(msg);
            $('#modal-gameover').fadeIn();
        }

        // --- KLASSIK CHLICK KLIK (PIESALARNI YURITISH) ---
        function handleSquareClick() {
            if (isBotMode && game.turn() !== myColor.charAt(0)) return;
            
            let square = $(this).attr('data-square');
            
            if (selectedSquare === square) {
                selectedSquare = null;
                $('.square-55d63').removeClass('highlight-active highlight-move');
                return;
            }

            let move = game.move({ from: selectedSquare, to: square, promotion: 'q' });

            if (move) {
                board.position(game.fen());
                highlightLastMove(selectedSquare, square);
                playSound(move.captured ? 'capture' : 'move');
                selectedSquare = null;
                $('.square-55d63').removeClass('highlight-active highlight-move');

                if (isBotMode) {
                    checkBotGameStatus();
                    if (!game.game_over()) setTimeout(makeBotMove, 800);
                } else {
                    // Firebase DB ni yangilash
                    db.ref('games/'+gameId).update({
                        fen: game.fen(),
                        turn: game.turn()
                    });
                }
            } else {
                selectedSquare = square;
                $('.square-55d63').removeClass('highlight-active highlight-move');
                $(this).addClass('highlight-active');
                
                let moves = game.moves({ square: square, verbose: true });
                moves.forEach(m => { $('.square-' + m.to).addClass('highlight-move'); });
            }
        }

        // --- BOT REJIM MATN VA VAQT SOZLAMALARI ---
        function startBotGame() {
            isBotMode = true;
            gameId = null;
            myColor = prefs.color === 'w' ? 'w' : 'b';
            
            $('.screen').addClass('hidden'); $('#screen-game').removeClass('hidden');
            $('#modal-waiting').hide(); $('#modal-searching').hide(); $('#modal-join').hide();

            $('#name-top').text("UzChess Bot AI 🤖");
            $('#dot-top').attr('class', 'status-dot online');

            game = new Chess();
            if(board) board.destroy();
            board = ChessBoard('myBoard', {
                draggable: false,
                position: 'start',
                orientation: myColor==='w'?'white':'black',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            $('#myBoard').off('click').on('click', '.square-55d63', handleSquareClick);
            
            botWTime = prefs.time * 60;
            botBTime = prefs.time * 60;
            startBotClocks();

            if (myColor === 'b') setTimeout(makeBotMove, 800);
        }

        function makeBotMove() {
            if (game.game_over()) return;
            const moves = game.moves({ verbose: true });
            if (moves.length === 0) return;

            let move = moves[Math.floor(Math.random() * moves.length)];
            const captures = moves.filter(m => m.flags.includes('c'));
            if (captures.length > 0) move = captures[Math.floor(Math.random() * captures.length)];

            game.move(move);
            board.position(game.fen());
            highlightLastMove(move.from, move.to);
            playSound(game.in_check() ? 'check' : (move.flags.includes('c') ? 'capture' : 'move'));

            checkBotGameStatus();
        }

        function checkBotGameStatus() {
            if (game.game_over()) {
                clearInterval(timerInt);
                let msg = game.in_checkmate() ? (game.turn() === myColor ? "Bot sizni mot qildi!" : "Siz g'olib bo'ldingiz!") : "Durrang!";
                showGameOver(msg);
            }
        }

        function startBotClocks() {
            clearInterval(timerInt);
            const fmt = s => { let m=Math.floor(s/60), x=Math.floor(s%60); return (m<10?'0':'')+m+':'+(x<10?'0':'')+x; };
            timerInt = setInterval(() => {
                if (game.turn() === 'w') botWTime--; else botBTime--;
                if(botWTime<=0 || botBTime<=0) { clearInterval(timerInt); showGameOver("Vaqt tugadi!"); return; }
                
                if(myColor==='w') {
                    $('#clock-bottom').text(fmt(botWTime)).toggleClass('active', game.turn()==='w');
                    $('#clock-top').text(fmt(botBTime)).toggleClass('active', game.turn()==='b');
                } else {
                    $('#clock-bottom').text(fmt(botBTime)).toggleClass('active', game.turn()==='b');
                    $('#clock-top').text(fmt(botWTime)).toggleClass('active', game.turn()==='w');
                }
            }, 1000);
        }

        function loadGame(gid) {
            db.ref('games/'+gid).once('value', s=>{
                const d = s.val();
                if(!d) { showToast("O'yin topilmadi!"); goHome(); return; }
                if(d.p1_id == user.id) { myColor = d.creatorColor; initBoard(d.status==='waiting'); listenToGameUpdates(gid); }
                else if(!d.p2_id) {
                    $('#join-opp').text(d.p1_name);
                    $('#join-time').text((d.initialTime/60)+" min");
                    $('#join-color').text(d.creatorColor==='w' ? "Qora" : "Oq");
                    $('.screen').addClass('hidden'); $('#screen-game').removeClass('hidden');
                    $('#modal-join').show();
                } else if(d.p2_id == user.id) { myColor = (d.creatorColor==='w'?'b':'w'); initBoard(false); listenToGameUpdates(gid); }
                else { showToast("O'yin allaqachon to'la!"); goHome(); }
            });
        }

        function acceptGame() {
            localStorage.setItem('uzchess_last_game_id', gameId);
            $('#modal-join').hide();
            db.ref('games/'+gameId).update({ p2_name: user.first_name, p2_id: user.id, status: 'playing', p2_online: true }).then(()=>{
                db.ref('games/'+gameId).once('value', s=>{
                    let d = s.val();
                    myColor = (d.creatorColor==='w'?'b':'w');
                    initBoard(false);
                    listenToGameUpdates(gameId);
                });
            });
        }

        function initBoard(isWaiting) {
            $('.screen').addClass('hidden'); $('#screen-game').removeClass('hidden');
            if(isWaiting) $('#modal-waiting').show(); else $('#modal-waiting').hide();

            game = new Chess();
            if(board) board.destroy();
            board = ChessBoard('myBoard', {
                draggable: false,
                position: 'start',
                orientation: myColor==='w'?'white':'black',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            $('#myBoard').off('click').on('click', '.square-55d63', handleSquareClick);
        }

        function gameAction(action) {
            if(isBotMode && action==='resign') { if(confirm("Taslim bo'lasizmi?")) showGameOver("Botga taslim bo'ldingiz."); return; }
            if(!gameId) return;
            if(action==='resign') { if(confirm("Taslim bo'lmoqchimisiz?")) db.ref('games/'+gameId).update({ status: 'resign_'+myColor }); }
        }

        // Dastlabki yuklanishda parametr bormi yo'qmi tekshirish
        if(gameId) loadGame(gameId);
    </script>
</body>
</html>
